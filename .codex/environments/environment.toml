version = 1
name = "wordpack-for-english"

[setup]
script = '''
set -e
WORKTREE_PATH="${CODEX_WORKTREE_PATH:-$PWD}"
cd "$WORKTREE_PATH"
export PIP_CACHE_DIR="$WORKTREE_PATH/.cache/pip"
export PLAYWRIGHT_BROWSERS_PATH="$WORKTREE_PATH/.cache/ms-playwright"
run_python() {
    if [ "$(uname -s)" = "Darwin" ] && command -v arch >/dev/null 2>&1 && arch -arm64 /usr/bin/true >/dev/null 2>&1; then
        arch -arm64 "$@"
    else
        "$@"
    fi
}
select_python() {
    for candidate in "${PYTHON:-}" python3.13 python3; do
        [ -n "$candidate" ] || continue
        if command -v "$candidate" >/dev/null 2>&1 && run_python "$candidate" - <<'PY' >/dev/null 2>&1; then
import sys

raise SystemExit(0 if sys.version_info[:2] == (3, 13) else 1)
PY
            command -v "$candidate"
            return 0
        fi
    done

    if command -v pyenv >/dev/null 2>&1; then
        while IFS= read -r version; do
            [ -n "$version" ] || continue
            prefix="$(pyenv prefix "$version" 2>/dev/null)" || continue
            candidate="$prefix/bin/python"
            [ -x "$candidate" ] || continue
            if run_python "$candidate" - <<'PY' >/dev/null 2>&1; then
import sys

raise SystemExit(0 if sys.version_info[:2] == (3, 13) else 1)
PY
                printf '%s\n' "$candidate"
                return 0
            fi
        done <<EOF
$(pyenv versions --bare 2>/dev/null)
EOF
    fi

    echo "Python 3.13 is required, but no usable interpreter was found." >&2
    return 1
}
PYTHON_BIN="$(select_python)"
run_python "$PYTHON_BIN" - <<'PY'
import sys

print(f"Using Python {sys.version.split()[0]} at {sys.executable}")
PY
run_python "$PYTHON_BIN" -m venv --clear .venv
. .venv/bin/activate
run_python python -m pip install -r requirements.txt
npm ci --no-audit
cd apps/frontend
npm ci --no-audit
cd "$WORKTREE_PATH"
npm run prepare:frontend-env
npx playwright install --with-deps
'''

